name: Deploy VuePress + Travel Memories + WanderLog + GGL + Plant-Sim to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true  # 连续 push 时取消旧构建，只部署最新的

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # 并行安装所有依赖
      - name: Install All Dependencies
        run: |
          npm ci &
          (cd travel-memories && pnpm install) &
          (cd wanderlog && npm ci) &
          (cd ggl && npm ci) &
          (cd plant-sim && npm install --no-audit --no-fund) &
          wait

      # 构建 VuePress（最慢，先启动）
      - name: Build VuePress Site
        run: npm run build

      # 并行构建其余三个项目
      - name: Build Sub-projects in Parallel
        run: |
          (cd travel-memories && pnpm build) &
          (cd wanderlog && npm run build) &
          (cd ggl && npm run build) &
          (cd plant-sim && npm run build) &
          wait

      # Merge all outputs
      - name: Merge Build Outputs
        run: |
          # Travel Memories
          rm -rf .vuepress/dist/travel-memories
          cp -r travel-memories/dist .vuepress/dist/travel-memories
          cp .vuepress/dist/travel-memories/index.html .vuepress/dist/travel-memories/404.html

          # WanderLog
          rm -rf .vuepress/dist/wanderlog
          cp -r wanderlog/dist .vuepress/dist/wanderlog
          cp .vuepress/dist/wanderlog/index.html .vuepress/dist/wanderlog/404.html

          # GGL
          rm -rf .vuepress/dist/ggl
          cp -r ggl/dist .vuepress/dist/ggl
          cp .vuepress/dist/ggl/index.html .vuepress/dist/ggl/404.html
          mkdir -p .vuepress/dist/ggl/admin .vuepress/dist/ggl/wheel
          cp .vuepress/dist/ggl/index.html .vuepress/dist/ggl/admin/index.html
          cp .vuepress/dist/ggl/index.html .vuepress/dist/ggl/wheel/index.html

          # Plant Sim
          rm -rf .vuepress/dist/plant-sim
          cp -r plant-sim/dist .vuepress/dist/plant-sim
          cp .vuepress/dist/plant-sim/index.html .vuepress/dist/plant-sim/404.html

      - name: Upload Artifact
        if: success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: .vuepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
