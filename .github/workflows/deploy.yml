name: Deploy VuePress + Travel Memories + WanderLog + GGL to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # Build VuePress blog
      - name: Install VuePress Dependencies
        run: npm install

      - name: Build VuePress Site
        run: npm run build

      # Build Travel Memories app
      - name: Install Travel Memories Dependencies
        working-directory: travel-memories
        run: pnpm install

      - name: Build Travel Memories
        working-directory: travel-memories
        run: pnpm build

      # Build WanderLog app
      - name: Install WanderLog Dependencies
        working-directory: wanderlog
        run: npm install

      - name: Build WanderLog
        working-directory: wanderlog
        run: npm run build

      # Build GGL (Anniversary Scratch Card) app
      - name: Install GGL Dependencies
        working-directory: ggl
        run: npm install

      - name: Build GGL
        working-directory: ggl
        run: npm run build

      # Merge all outputs
      - name: Merge Build Outputs
        run: |
          # Travel Memories
          rm -rf .vuepress/dist/travel-memories
          cp -r travel-memories/dist .vuepress/dist/travel-memories
          cp .vuepress/dist/travel-memories/index.html .vuepress/dist/travel-memories/404.html

          # WanderLog
          rm -rf .vuepress/dist/wanderlog
          cp -r wanderlog/dist .vuepress/dist/wanderlog
          cp .vuepress/dist/wanderlog/index.html .vuepress/dist/wanderlog/404.html

          # GGL
          rm -rf .vuepress/dist/ggl
          cp -r ggl/dist .vuepress/dist/ggl
          cp .vuepress/dist/ggl/index.html .vuepress/dist/ggl/404.html
          # SPA sub-route: /ggl/admin/ needs its own index.html
          mkdir -p .vuepress/dist/ggl/admin
          cp .vuepress/dist/ggl/index.html .vuepress/dist/ggl/admin/index.html

          echo "--- Final output structure ---"
          ls -la .vuepress/dist/
          ls -la .vuepress/dist/travel-memories/
          ls -la .vuepress/dist/wanderlog/
          ls -la .vuepress/dist/ggl/

      - name: Upload Artifact
        if: success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: .vuepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
