name: Deploy VuePress + Travel Memories to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # Build VuePress blog
      - name: Install VuePress Dependencies
        run: npm install

      - name: Build VuePress Site
        run: npm run build

      # Build Travel Memories app
      - name: Install Travel Memories Dependencies
        working-directory: travel-memories
        run: pnpm install

      - name: Build Travel Memories
        working-directory: travel-memories
        run: pnpm build

      # Merge outputs: copy travel-memories dist into VuePress dist
      - name: Merge Build Outputs
        run: |
          cp -r travel-memories/dist .vuepress/dist/travel-memories
          echo "--- Final output structure ---"
          ls -la .vuepress/dist/
          ls -la .vuepress/dist/travel-memories/

      - name: Upload Artifact
        if: success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: .vuepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
